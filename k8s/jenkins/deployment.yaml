apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins-sa
      nodeSelector:
        role: tools
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: jnlp
          env:
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: docker-socket
              mountPath: /var/run
            - name: tools
              mountPath: /usr/local/bin/kubectl
              subPath: kubectl
            - name: tools
              mountPath: /usr/local/bin/docker
              subPath: docker
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /var/run
      initContainers:
        - name: install-kubectl
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
          volumeMounts:
            - name: tools
              mountPath: /tools
        - name: install-docker-cli
          image: docker:cli
          command:
            - sh
            - -c
            - |
              cp /usr/local/bin/docker /tools/docker
          volumeMounts:
            - name: tools
              mountPath: /tools
        - name: fix-permissions
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              chown 1000:1000 /var/jenkins_home
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-home
        - name: docker-socket
          emptyDir: {}
        - name: docker-storage
          emptyDir: {}
        - name: tools
          emptyDir: {}
